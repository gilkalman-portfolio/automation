name: Automated Test Runner

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────────
on:
  # Scheduled: every day at 02:00 UTC
  schedule:
    - cron: '0 2 * * *'

  # Manual trigger from the GitHub UI / API
  workflow_dispatch:
    inputs:
      marker:
        description: 'Pytest marker filter (leave blank for all tests)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - smoke
          - regression
          - sanity
          - api
          - ui
      ai_fix:
        description: 'Enable Claude AI to auto-fix failing tests'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# ──────────────────────────────────────────────────────────────────────────────
# Permissions — needed to push the report back to the repo
# ──────────────────────────────────────────────────────────────────────────────
permissions:
  contents: write

jobs:
  test-and-fix:
    name: Run → Fix → Report
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history so the push-back step works cleanly

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.flex.txt

      - name: Install Python dependencies
        run: pip install -r requirements.flex.txt

      # ── 3. Playwright browsers ───────────────────────────────────────────────
      - name: Install Playwright + Chromium
        run: python -m playwright install chromium --with-deps

      # ── 4. Claude Code CLI (required by claude-agent-sdk) ────────────────────
      - name: Set up Node.js (for Claude Code CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # ── 5. Run the automated test runner ─────────────────────────────────────
      - name: Run automated test runner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISPLAY: ''
        run: |
          ARGS=""

          MARKER="${{ github.event.inputs.marker }}"
          [ -n "$MARKER" ] && ARGS="$ARGS -m $MARKER"

          # Enable AI fix only when explicitly requested AND the secret exists
          AI_FIX="${{ github.event.inputs.ai_fix }}"
          if [ "$AI_FIX" = "true" ] && [ -n "$ANTHROPIC_API_KEY" ]; then
            ARGS="$ARGS --ai-fix"
          fi

          python automated_test_runner.py $ARGS

      # ── 6. Upload reports as workflow artifacts ───────────────────────────────
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.run_id }}
          path: |
            reports/
            test_runs/
          retention-days: 30

      # ── 7. Commit the Markdown report back to the repo ────────────────────────
      #    This makes reports browsable directly on GitHub without downloading
      #    an artifact zip.
      - name: Commit report to repository
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only add the reports directory; test_runs/ is intentionally excluded
          git add reports/ || true

          # If nothing changed (all tests already passed and report is identical),
          # skip the commit gracefully
          if git diff --cached --quiet; then
            echo "No new report to commit."
          else
            MARKER="${{ github.event.inputs.marker }}"
            LABEL=${MARKER:+"-m $MARKER"}
            git commit -m "chore: automated test report $(date -u '+%Y-%m-%d %H:%M UTC') $LABEL [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
